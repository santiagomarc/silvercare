<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SilverCare Offline</title>
    <style>
        :root {
            color-scheme: light dark;
            font-family: Montserrat, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at top left, #e0f2fe, #f8fafc 45%, #fee2e2 100%);
            color: #0f172a;
        }
        .card {
            width: min(92vw, 560px);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 24px 56px -28px rgba(15, 23, 42, 0.35);
            padding: 2rem;
        }
        h1 {
            margin: 0 0 .5rem;
            font-size: 1.7rem;
            font-weight: 900;
        }
        p {
            margin: 0;
            line-height: 1.6;
            font-size: 1rem;
            color: #334155;
        }
        .hint {
            margin-top: 1rem;
            font-size: .9rem;
            color: #64748b;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <section class="card">
        <h1>You are offline</h1>
        <p>SilverCare can still capture selected actions while offline. Once your connection returns, queued updates are synced automatically.</p>
        <p class="hint">Tip: keep this tab open and reconnect to continue syncing.</p>
    </section>
</body>
</html>
